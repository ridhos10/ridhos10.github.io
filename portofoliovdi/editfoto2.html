<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabungan Gambar</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: black;
  font-family: Arial, sans-serif;
}

/* Judul SUPER TEBAL */
.title {
  width: 100%;
  text-align: center;
  font-size: 40px;
  font-weight: 900;
  color: yellow;
  -webkit-text-stroke: 3px black;
  text-shadow: 
    2px 2px 0 black,
    -2px -2px 0 black,
    2px -2px 0 black,
    -2px 2px 0 black;
  margin: 20px 0;
}

/* Frame */
.frame {
  width: 100vw;
  height: calc(100vh - 100px);
  display: flex;
}

/* Gambar */
.frame img {
  width: 50%;
  height: 100%;
  object-fit: cover; /* BIAR RAPAT */
}
</style>
</head>

<body>

<div class="title">MAINTENANCE PRINTER</div>

<div class="frame">
  <img src="maintenanceprinter.jpeg">
  <img src="maintenanceprinter2.jpeg">
</div>

</body>
</html>
