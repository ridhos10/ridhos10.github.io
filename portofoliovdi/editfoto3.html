<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merge Horizontal Final</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: black;
  font-family: Arial, sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* JUDUL */
.title {
  text-align: center;
  font-size: 36px;
  font-weight: 900;
  color: yellow;

  -webkit-text-stroke: 3px black;

  text-shadow:
    2px 2px 0 black,
    -2px -2px 0 black,
    2px -2px 0 black,
    -2px 2px 0 black;

  padding: 10px;
  flex-shrink: 0;
  margin-top: 100px;
}

/* FRAME */
.frame {
  flex: 1;
  display: flex;
  gap: 5px;
  padding: 5px;
  align-items: stretch;
}

/* BOX */
.box {
  flex: 1; /* semua sama besar */
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
}

/* GAMBAR */
.box img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
</style>
</head>

<body>
<br><br><br><br><br><br>
<div class="title">PEMASANGAN PC ANTRIAN CIMB</div>

<div class="frame">
  <div class="box">
    <img src="proseskonfigurasipcantriancimb.jpeg">
  </div>
  <div class="box">
    <img src="pcantriancimb1.jpeg">
  </div>
  <div class="box">
    <img src="hasilpemasanganpcantriancimb.jpeg">
  </div>
  <div class="box">
    <img src="hasilpemasanganpcantriancimb2.jpeg">
  </div>
</div>

</body>
</html>
