<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before After Fullscreen</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: black;
}

/* Frame fullscreen */
.frame {
  width: 100vw;
  height: 100vh;
  display: flex;
}

/* Kiri & kanan */
.half {
  width: 50%;
  height: 100%;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
}

/* Gambar */
.half img {
  width: 100%;
  height: 100%;
  object-fit: contain; /* biar tidak kepotong */
}

/* Label */
.label {
  position: absolute;
  top: 20px;
  left: 20px;
  padding: 8px 16px;
  background: yellow;
  border: 4px solid black;
  font-weight: bold;
  font-size: 18px;
}

/* Garis tengah */
.divider {
  position: absolute;
  width: 5px;
  height: 100%;
  background: white;
  left: 50%;
  transform: translateX(-50%);
}
</style>
</head>

<body>

<div class="frame">
  <div class="half">
    <span class="label">Before</span>
    <img src="prosespergantianfasciaatm.jpeg">
  </div>

  <div class="half">
    <span class="label">After</span>
    <img src="hasilpergantianfasciaatm.jpeg">
  </div>

  <div class="divider"></div>
</div>

</body>
</html>
